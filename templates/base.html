<!DOCTYPE html>
<html lang="es-mx">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="language" content="Spanish">
  <title>{% block title %}{% endblock %} | Gestoría Vehicular JC</title>
  <!-- BOOTSTRAP STYLE -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <!-- BOOTSTRAP ICONS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- CSS STYLE -->
  <link rel="stylesheet" href="{{ url_for('static', filename='/css/style.css') }}">
  <!-- ICONOS -->
  <link rel="icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}" sizes="any">
  <link rel="icon" href="{{ url_for('static', filename='favicon/favicon.svg') }}" type="image/svg+xml" media="(prefers-color-scheme: light)">
  <link rel="icon" href="{{ url_for('static', filename='favicon/favicon-light.svg') }}" type="image/svg+xml" media="(prefers-color-scheme: dark)">
  {% block head %}{% endblock %}
</head>
<body>
  {% include "partials/nav.html" %}
  <main>
    {% block content %}{% endblock %}
  </main>
  {% include "partials/footer.html" %}

  <!-- BOOTSTRAP SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
